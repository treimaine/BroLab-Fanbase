# Dependabot Configuration
# Prevents problematic automatic updates that cause deployment failures

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly" # Reduce frequency to avoid conflicts
      day: "monday"
      time: "09:00"
    # Group related updates together
    groups:
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      next-ecosystem:
        patterns:
          - "next*"
          - "eslint-config-next"
      clerk-ecosystem:
        patterns:
          - "@clerk/*"
      stripe-ecosystem:
        patterns:
          - "stripe*"
          - "@stripe/*"
      radix-ecosystem:
        patterns:
          - "@radix-ui/*"
    # Ignore problematic packages that cause conflicts
    ignore:
      # ESLint v9 has breaking changes - stay on v8
      - dependency-name: "eslint"
        versions: [">=9.0.0"]
      # Tailwind v4 is still beta - stay on v3
      - dependency-name: "tailwindcss" 
        versions: [">=4.0.0"]
      # PostCSS v9 has compatibility issues
      - dependency-name: "postcss"
        versions: [">=9.0.0"]
    # Auto-merge minor and patch updates for stable packages
    open-pull-requests-limit: 5
    reviewers:
      - "treimaine"
    assignees:
      - "treimaine"
    commit-message:
      prefix: "deps"
      include: "scope"