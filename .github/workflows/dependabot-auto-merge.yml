name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test --if-present
      
      - name: Run security audit
        run: npm audit --omit=dev
        continue-on-error: true
      
      - name: Check if safe to auto-merge
        id: check-merge
        run: |
          # Only auto-merge patch and minor updates for trusted packages
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          # Check if it's a patch/minor update
          if echo "$PR_TITLE" | grep -E "(patch|minor)" > /dev/null; then
            echo "safe=true" >> $GITHUB_OUTPUT
          else
            echo "safe=false" >> $GITHUB_OUTPUT
            echo "Major update detected - requires manual review"
          fi
      
      - name: Add no-deploy label for manual review
        if: steps.check-merge.outputs.safe == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['no-deploy', 'manual-review-required']
            })
      
      - name: Auto-approve safe updates
        if: steps.check-merge.outputs.safe == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: 'Auto-approved safe dependency update'
            })
      
      - name: Enable auto-merge for safe updates
        if: steps.check-merge.outputs.safe == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.pulls.enableAutoMerge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            })